<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Board Beta | Global Tutor Board</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --accent: #06b6d4; --dark: #0b1120; --text: #f8fafc; }
        body { background-color: var(--dark); color: var(--text); font-family: sans-serif; padding: 40px 20px; text-align: center; }
        .auth-card { max-width: 400px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid var(--accent); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; padding: 15px; width: 100%; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>
    <h1>Join the Board (Beta)</h1>
    <p>Create your tutor account to begin.</p>
    <div class="auth-card">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="signUpTutor()">CREATE ACCOUNT</button>
        <p id="msg" style="font-size: 0.9rem; margin-top: 15px; font-weight: bold;"></p>
    </div>
    <script>
        const SUPABASE_URL = 'https://njhjxmnxmmodhlpxkdaz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ox4QWCRam_IsX-vXZ1tu7A_Kyj-zCgQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signUpTutor() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.innerText = "⏳ Connecting...";
            
            const urlParams = new URLSearchParams(window.location.search);
            let ref = urlParams.get('ref') || localStorage.getItem('gtb_ref_code');

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { 
                    data: { referral_code: ref },
                    // FORCES REDIRECT TO SHADOW ENGINE DASHBOARD
                    emailRedirectTo: 'https://apertumgrid.github.io/portal/dashboard.html'
                }
            });

            if (error) {
                msg.innerText = "❌ Error: " + error.message;
                msg.style.color = "#ff4d4d";
            } else {
                msg.innerText = "✅ Account Created! Check your email to confirm and access your dashboard.";
                msg.style.color = "#22c55e";
            }
        }
    </script>
</body>
</html>
