<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard | Shadow Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --accent: #06b6d4; --dark: #0b1120; --text: #f8fafc; }
        body { background-color: var(--dark); color: var(--text); font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; padding: 15px; width: 100%; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #msg { margin-top: 15px; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading">⏳ Loading your profile...</div>

    <div id="editor" class="hidden">
        <h2 style="margin-top:0;">Tutor Settings</h2>
        <p id="user-display" style="font-size: 0.8rem; color: var(--accent);"></p>
        
        <input type="text" id="name" placeholder="Display Name (e.g. Teacher Sam)">
        <input type="text" id="whatsapp" placeholder="WhatsApp (e.g. 639...)">
        <textarea id="bio" rows="5" placeholder="Your experience..."></textarea>
        
        <button class="btn" onclick="save()">SAVE TO BOARD</button>
        <button onclick="supabaseClient.auth.signOut().then(() => location.reload())" style="background:none; border:none; color:#64748b; cursor:pointer; margin-top:15px; width:100%;">Log Out</button>
    </div>

    <div id="logged-out" class="hidden">
        <h2>Not Logged In</h2>
        <p>Please sign up or log in to access your dashboard.</p>
        <a href="index.html" class="btn" style="display:block; text-decoration:none; text-align:center;">GO TO SIGN UP</a>
    </div>

    <div id="msg"></div>
</div>

<script>
    const SUPABASE_URL = 'https://njhjxmnxmmodhlpxkdaz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ox4QWCRam_IsX-vXZ1tu7A_Kyj-zCgQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        document.getElementById('loading').classList.add('hidden');

        if (!user) {
            document.getElementById('logged-out').classList.remove('hidden');
            return;
        }

        // We are logged in!
        document.getElementById('editor').classList.remove('hidden');
        document.getElementById('user-display').innerText = "Logged in: " + user.email;

        // Pull existing data
        const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
        if (data) {
            document.getElementById('name').value = data.full_name || '';
            document.getElementById('whatsapp').value = data.whatsapp_number || '';
            document.getElementById('bio').value = data.bio || '';
        }
    }

    async function save() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const msg = document.getElementById('msg');
        msg.innerText = "Saving...";

        const { error } = await supabaseClient.from('profiles').upsert({
            id: user.id,
            full_name: document.getElementById('name').value,
            whatsapp_number: document.getElementById('whatsapp').value,
            bio: document.getElementById('bio').value,
            updated_at: new Date()
        });

        if (error) {
            msg.innerText = "❌ Error: " + error.message;
            msg.style.color = "red";
        } else {
            msg.innerText = "✅ Profile Saved!";
            msg.style.color = "#22c55e";
        }
    }

    init();
</script>
</body>
</html>
